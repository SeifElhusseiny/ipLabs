<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Lab 3 task</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #e5e5e5;
    }

    .calculator {
      width: 320px;
      background: black;
      padding: 20px;
      border-radius: 30px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.4);
    }

    .title {
      color: white;
      text-align: center;
      font-size: 1.2rem;
      margin-bottom: 15px;
      font-weight: bold;
      letter-spacing: 1px;
    }

    .display {
      width: 100%;
      height: 100px;              /* bigger height like full screen */
      background: darkgoldenrod;          /* same as calculator body */
      color: white;
      font-size: 3rem;
      text-align: right;
      padding: 20px;
      margin-bottom: 20px;
      overflow-x: hidden;
      display: flex;
      align-items: flex-end;      /* text at bottom like iOS */
      justify-content: flex-end;
    }

    .buttons {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
    }

    button {
      height: 60px;
      border: none;
      border-radius: 50%;
      font-size: 1.4rem;
      cursor: pointer;
      transition: 0.2s;
    }

    button:active {
      transform: scale(0.95);
    }

    .number {
      background: #333;
      color: white;
    }

    .operator {
      background: orange;
      color: white;
    }

    .function {
      background: #a5a5a5;
      color: black;
    }

    .zero {
      grid-column: span 2;
      border-radius: 30px;
      text-align: left;
      padding-left: 25px;
    }
  </style>
</head>
<body>

<div class="calculator">
  <div class="title">ios Calculator</div>
  <div class="display" id="display">0</div>

  <div class="buttons">
    <button class="function" data-value="AC">AC</button>
    <button class="function" data-value="%">%</button>
    <button class="function" data-value="DEL">DEL</button>
    <button class="operator" data-value="/">÷</button>

    <button class="number" data-value="7">7</button>
    <button class="number" data-value="8">8</button>
    <button class="number" data-value="9">9</button>
    <button class="operator" data-value="*">×</button>

    <button class="number" data-value="4">4</button>
    <button class="number" data-value="5">5</button>
    <button class="number" data-value="6">6</button>
    <button class="operator" data-value="-">−</button>

    <button class="number" data-value="1">1</button>
    <button class="number" data-value="2">2</button>
    <button class="number" data-value="3">3</button>
    <button class="operator" data-value="+">+</button>

    <button class="number zero" data-value="0">0</button>
    <button class="number" data-value=".">.</button>
    <button class="operator" data-value="=">=</button>
  </div>
</div>

<script src="lab3.js"></script>
</body>
</html>
